# nginx snippet for each RPC node. Drop into /etc/nginx/conf.d/staccana-rpc.conf.
#
# Provides:
#   - /health endpoint that returns 200 OK iff the local validator is producing slots
#     within 32 of network tip (Cloudflare LB monitor uses this)
#   - Reverse proxy from :443 → local :8899 with TLS termination
#   - API key auth header check (rejects unauthenticated requests at launch)
#   - Per-IP rate limiting (100 req/min default; raise after launch confidence)

upstream staccana_validator_local {
    server 127.0.0.1:8899;
    keepalive 64;
}

# Rate limiting zone: 10MB shared memory holds ~160k unique IPs at the rate limit
limit_req_zone $binary_remote_addr zone=staccana_rpc:10m rate=100r/m;

# Origin TLS — Cloudflare → us. Use Cloudflare-issued origin cert pinned to *.mp.fun
server {
    listen 443 ssl http2;
    server_name rpc-us-west.mp.fun rpc.mp.fun;

    ssl_certificate     /etc/ssl/cf-origin.crt;
    ssl_certificate_key /etc/ssl/cf-origin.key;

    # Health endpoint — Cloudflare LB monitor probes this
    location = /health {
        access_log off;
        # Validator's RPC `getHealth` returns "ok" when slot lag < 128.
        # We reduce that to slot lag < 32 by checking ourselves.
        content_by_lua_block {
            local http = require "resty.http"
            local httpc = http.new()
            local res = httpc:request_uri("http://127.0.0.1:8899", {
                method = "POST",
                body = '{"jsonrpc":"2.0","id":1,"method":"getHealth"}',
                headers = {["Content-Type"] = "application/json"}
            })
            if res and res.status == 200 and res.body:find('"result":"ok"') then
                ngx.status = 200
                ngx.say("ok")
            else
                ngx.status = 503
                ngx.say("degraded")
            end
        }
    }

    # API-key gate — header `X-Staccana-Key: <key>` required
    # In production: keys live in /etc/staccana/api-keys.txt, hot-reloaded
    set $api_key_ok 0;
    if ($http_x_staccana_key = "REPLACE_WITH_REAL_KEY") {
        set $api_key_ok 1;
    }
    # Soft-launch: allow Cloudflare's IP ranges through without API key (for the public URL)
    # Real implementation: compare $remote_addr against Cloudflare's IP list

    location / {
        # API-key check (soft-enforced at launch; toggle to hard-enforce later)
        # if ($api_key_ok = 0) { return 401; }

        limit_req zone=staccana_rpc burst=20 nodelay;

        proxy_pass         http://staccana_validator_local;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
