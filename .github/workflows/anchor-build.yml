name: Anchor build (bridge + secret-pump .so artifacts)

on:
  push:
    branches: [staccana, main]
    paths:
      - 'programs/bridge/**'
      - 'programs/secret-pump/**'
      - '.github/workflows/anchor-build.yml'
  workflow_dispatch:
  release:
    types: [published]

env:
  SOLANA_VERSION: 2.0.25
  ANCHOR_VERSION: 0.30.1   # bump to 1.0.x once Phase 5.5 (anchor upgrade) lands

jobs:
  build:
    name: build .so for ${{ matrix.program }}
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        program:
          - bridge
          - secret-pump
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Build .so via anchor
        run: cd programs/${{ matrix.program }} && anchor build

      - name: Upload .so artifact
        uses: actions/upload-artifact@v7
        with:
          name: staccana-${{ matrix.program }}-so
          path: programs/${{ matrix.program }}/target/deploy/staccana_*.so
          retention-days: 30
          if-no-files-found: error
